<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- FIX: Corrected Tab Icons Path & Type -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">

    <title>My Profile Card</title>
    
    <!-- FontAwesome (For the Sun/Moon switch) -->
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css'>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        /* ========================================= */
        /* FULL-SIZE BORDERLESS SOCIAL LINKS         */
        /* ========================================= */
        .links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 25px 0;
        }
        
        .links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .links a:hover {
            transform: translateY(-5px) scale(1.1); 
        }

        .links i, .links img.custom-icon {
            font-size: 36px; 
            width: 36px;     
            height: 36px;
            object-fit: contain;
            line-height: 1;
            transition: opacity 0.3s ease;
        }

        .links a:hover i, .links a:hover img.custom-icon {
            opacity: 0.85; 
        }

        /* Original Official Brand Colors */
        .icon-web { color: #ce0458; }
        .icon-linkedin { color: #0a66c2; }  
        .icon-youtube { color: #FF0000; }   
        .icon-github { color: #f0f6fc; }    
        .icon-android { color: #3DDC84; }   
        .icon-whatsapp { color: #25D366; }  
        .icon-telegram { color: #229ED9; }  
    </style>
</head>

                    </a>
                    <a href="https://wa.me/966570323979" target="_blank" title="WhatsApp">

                    <a href="https://t.me/shahab99khan" target="_blank" title="Telegram">

                <a href="mailto:shahab99khan@gmail.com" target="_blank" class="btn">Contact Me</a>
