<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">

    <title>Dynamic Digital ID Card</title>
    
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="styles.css">

    <style>

        /* ========================================= */
        /* GLOBAL, CONTAINER & THEME                 */
        /* ========================================= */
        html, body { 
            margin: 0; 
            padding: 0;
            background-color: #050505; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #fff; 
            transition: background-color 0.3s; 
            width: 100vw;
            max-width: 100%;
            overflow-x: hidden;
            overflow-y: auto; 
        }
        
        .main-wrapper {
            position: relative; 
            min-height: 100vh;
            min-height: -webkit-fill-available; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            width: 100%; 
            max-width: 100vw;
            overflow-x: hidden; 
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding: 30px 10px; 
            box-sizing: border-box;
            flex-grow: 1; 
        }

        /* THEME SWITCHER BUTTON */
        #switch {
            position: absolute; 
            top: 20px;
            right: 20px;
            background: #1c1d24;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: #facc15;
            font-size: 20px;
            transition: transform 0.2s ease, background 0.3s;
        }
        #switch:hover { transform: scale(1.1); }

        /* Base Mobile Layout (Vertical) */
        .id-card {
            background: #0f1015;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            position: relative;
            margin: auto; 
        }

/* ========================================= */
        /* PANEL 1: Image & Overlay Section          */
        /* ========================================= */
        .id-photo-area {
            position: relative;
            width: 100%;
            /* FIX: Restored the proper 50vh scaling so it fits mobile screens */
            height: clamp(380px, 50vh, 500px); 
            overflow: hidden;
        }

        .id-photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        .image-gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #0f1015 5%, rgba(15, 16, 21, 0.8) 25%, transparent 55%);
        }

        .header-content {
            position: absolute;
            /* FIX: Lifted the text from 15px to 35px to clear the About Me card */
            bottom: 35px; 
            left: 25px; 
            z-index: 2;
        }

        .header-content h2 {
            margin: 0; font-size: 2.5rem; color: #ffffff; text-transform: uppercase;
            line-height: 1.1; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .id-designation {
            color: #e2e8f0; font-weight: 500; font-size: 1.1rem;
            margin-top: 5px; margin-bottom: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .id-company-wrapper { display: flex; align-items: center; gap: 10px; }
        .company-icon {
            background: #facc15; color: #000; width: 24px; height: 24px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 12px;
        }
        .id-company-header {
            font-size: 1rem; color: #ffffff; font-weight: 700; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* ========================================= */
        /* PANEL 2: Details & Social Section         */
        /* ========================================= */
        .id-details-area {
            /* FIX: Added 10px top padding and removed the negative margin */
            padding: 10px 25px 20px 25px;
            display: flex;
            flex-direction: column;
            z-index: 3;
            margin-top: 0; 
        }

        .about-card {
            background: #1c1d24; border-radius: 20px; padding: 20px 20px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 25px; 
        }
        .about-card h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #ffffff; }
        .id-tagline { color: #a0aec0; font-size: 0.9rem; margin: 0; line-height: 1.5; }

        .links {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 15px;
            max-width: 300px; 
            margin-left: auto;
            margin-right: auto;
        }

        .links a {
            background: transparent; 
            width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.3s ease;
        }

        .links a:hover { transform: translateY(-3px) scale(1.1); }
        .links i { font-size: 28px; }

        /* ========================================= */
        /* PANEL 3: Bottom Action Dock               */
        /* ========================================= */
        .id-action-area {
            padding: 20px 15px 25px 15px; 
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .action-circle-btn, .action-pill-btn {
            background: #ffffff; color: #0f1015; border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center; text-decoration: none;
            transition: transform 0.2s, background-color 0.3s, color 0.3s;
        }

        .action-circle-btn { 
            width: 45px; height: 45px; min-width: 45px; min-height: 45px;
            border-radius: 50%; font-size: 20px; flex-shrink: 0; 
        }

        .action-pill-btn { 
            flex-grow: 1; height: 45px; border-radius: 25px; font-weight: 700; 
            gap: 8px; padding: 0 15px; text-align: center; font-size: 0.9rem;
        }

        .action-circle-btn:hover, .action-pill-btn:hover { transform: scale(1.05); }

        /* ========================================= */
        /* MODALS (QR & vCard)                       */
        /* ========================================= */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 10000;
            justify-content: center; align-items: center;
        }
        .modal-content { 
            background: #1c1d24; padding: 30px; border-radius: 24px; text-align: center; 
            position: relative; width: 85%; max-width: 350px; transition: background-color 0.3s; 
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #a0aec0; cursor: pointer; }
        
        .qr-code-img { width: 200px; height: 200px; background: #fff; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .barcode-img { height: 60px; max-width: 100%; background: #fff; padding: 10px; border-radius: 8px; }

        /* NEW: Contact Details List Styling inside Modal */
        .contact-details-list { display: flex; flex-direction: column; gap: 12px; text-align: left; }

        /* NEW: Contact Details List Styling inside Modal */
        .contact-details-list { display: flex; flex-direction: column; gap: 12px; text-align: left; }
        
        .detail-item {
            display: flex; align-items: center; gap: 15px; background: #2a2e40;
            padding: 15px; border-radius: 12px; transition: all 0.3s ease;
            cursor: pointer; /* Makes it look clickable */
        }
        
        /* Hover effect to show it's interactive */
        .detail-item:hover { background: #373c52; transform: translateY(-2px); }
        body.light-theme .detail-item:hover { background: #e2e8f0; }

        .detail-item i { font-size: 20px; color: #facc15; width: 25px; text-align: center; }
        .detail-item div { display: flex; flex-direction: column; }
        .detail-item small { color: #a0aec0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; transition: color 0.3s; }
        .detail-info { color: #ffffff; font-size: 0.95rem; font-weight: 500; word-break: break-word; }

        /* ========================================= */
        /* DESKTOP LAYOUT OVERRIDES                  */
        /* ========================================= */
        @media (min-width: 850px) {
            .container { padding: 40px 20px; }
            .id-card { flex-direction: row; max-width: 1050px; width: 95%; height: 500px; }
            .id-photo-area { flex: 0 0 35%; height: 100%; } 
            
            .image-gradient-overlay { background: linear-gradient(to right, transparent 35%, rgba(15, 16, 21, 0.9) 80%, #0f1015 100%); }
            .header-content { bottom: 40px; left: 40px; }
            .id-details-area { flex: 1; justify-content: center; padding: 40px 30px; margin-top: 0; }
            .links { max-width: none; justify-content: flex-start; margin-left: 0; margin-right: 0; }
            
            .id-action-area {
                flex: 0 0 220px; flex-direction: column; justify-content: center; align-items: center; 
                border-left: 1px dashed #2a2e40; padding: 40px 30px; gap: 20px; 
            }
            .action-circle-btn { width: 50px; height: 50px; min-width: 50px; font-size: 22px; }
            .action-pill-btn { height: 50px; padding: 0 20px; font-size: 1rem; width: 100%; flex-grow: 0; white-space: nowrap; }
        }

        /* ========================================= */
        /* LIGHT THEME OVERRIDES                     */
        /* ========================================= */
        body.light-theme { background-color: #e2e8f0; }
        body.light-theme .id-action-area { background-color: #ffffff; }

        @media (min-width: 850px) { body.light-theme .id-action-area { border-left-color: #cbd5e1; } }
        @media (max-width: 849px) { body.light-theme .id-action-area { border-top: 1px dashed #cbd5e1; } }

        body.light-theme .action-circle-btn, body.light-theme .action-pill-btn { background: #0f1015; color: #fff; }
        
        /* Modal Light Theme */
        body.light-theme .modal-content { background: #ffffff; border: 1px solid #cbd5e1; }
        body.light-theme .modal-content h3 { color: #0f1015 !important; }
        body.light-theme .detail-item { background: #f8fafc; border: 1px solid #e2e8f0; }
        body.light-theme .detail-info { color: #0f1015; }

        /* Counter Containment */
        .page-bottom-counter {
            text-align: center; padding: 20px; margin-top: 20px; color: #a0aec0;
            font-size: 14px; position: relative; z-index: 10;
            width: 100%; max-width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        .page-bottom-counter img, .page-bottom-counter iframe { max-width: 100%; height: auto; }
        body.light-theme .page-bottom-counter { color: #475569; }
    </style>
</head>
<body class="black-theme"> 
        <div id="switch">
            <i class="fas fa-sun"></i>
        </div>
    
    <div class="main-wrapper">
        <div class="container">
            <div class="id-card" data-tilt data-tilt-max="3" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.1">
               <div class="id-photo-area">
                    <img id="dom-profile-img" src="" alt="Profile Image">
                    <div class="image-gradient-overlay"></div>
                    
                    <div class="header-content">
                        <h2 id="dom-name">Loading...</h2>
                        <div class="id-designation" id="dom-designation">Loading...</div>
                        <div class="id-company-wrapper">
                            <div class="company-icon">C</div>
                            <div class="id-company-header" id="dom-company">Loading...</div>
                        </div>
                    </div>
                </div>
                
                <div class="id-details-area">
                    <div class="about-card">
                        <h3>About Me</h3>
                        <p class="id-tagline" id="dom-tagline">Loading information...</p>
                    </div>

                    <div class="links" id="dom-social-links"></div>
                </div> 

                <div class="id-action-area">
                    <button class="action-circle-btn" onclick="openQRModal()" title="Show QR Code">
                        <i class="fas fa-qrcode"></i>
                    </button>
                    
                    <button class="action-circle-btn" onclick="shareCard()" title="Share Profile">
                        <i class="fas fa-share-square"></i>
                    </button>
                    
                    <a href="#" id="dom-contact-btn" target="_blank" class="action-pill-btn">
                        Add to Contact <i class="fas fa-plus"></i>
                    </a>
                </div>
                
            </div> 
        </div> 

        <div class="page-bottom-counter">
            <a href='http://www.freevisitorcounters.com' style="color: inherit; text-decoration: none;">free visitor counters</a> <br><br>
            <script type='text/javascript' src='https://www.freevisitorcounters.com/auth.php?id=6a90fd511d85a5065fc6e135b2579f8964c9fc3e'></script>
            <script type="text/javascript" src="https://freevisitorcounters.com/en/home/counter/1427915/t/13"></script>
        </div>

    </div>

    <div id="qrModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeQRModal()">&times;</span>
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #fff;">Scan to Connect</h3>
            <img id="dom-qr-code" src="" alt="QR Code" class="qr-code-img">
            <img id="dom-barcode" src="" alt="Barcode" class="barcode-img">
            <div class="barcode-text" id="dom-barcode-text">Loading...</div>
        </div>
    </div>

    <div id="vcardModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeVcardModal()">&times;</span>
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #fff;">Contact Details</h3>
            
            <div class="contact-details-list">
                <div class="detail-item" onclick="copyDetail('dom-modal-name', this)">
                    <i class="fas fa-user"></i>
                    <div>
                        <small>Full Name</small>
                        <div class="detail-info" id="dom-modal-name">Loading...</div>
                    </div>
                </div>
                <div class="detail-item" onclick="copyDetail('dom-modal-email', this)">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <small>Email</small>
                        <div class="detail-info" id="dom-modal-email">Loading...</div>
                    </div>
                </div>
                <div class="detail-item" onclick="copyDetail('dom-modal-phone', this)">
                    <i class="fas fa-phone"></i>
                    <div>
                        <small>Phone Number</small>
                        <div class="detail-info" id="dom-modal-phone">Loading...</div>
                    </div>
                </div>
                <div class="detail-item" onclick="copyDetail('dom-modal-address', this)">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <small>Address</small>
                        <div class="detail-info" id="dom-modal-address">Loading...</div>
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 15px; font-size: 0.8rem; color: #a0aec0; font-style: italic;">
                *Tap any detail to copy
            </div>
        </div>
    </div>

    <script src="vanilla-tilt.js"></script>
    <script src="script.js"></script> 

    <script>
       document.addEventListener('DOMContentLoaded', () => {
            fetch(`json/data.json?t=${new Date().getTime()}`)
                .then(response => response.json())
                .then(data => {
                    // Populate Main Card
                    document.getElementById('dom-company').textContent = data.company;
                    document.getElementById('dom-name').innerHTML = data.name.replace(" ", "<br>"); 
                    document.getElementById('dom-designation').textContent = data.designation;
                    document.getElementById('dom-tagline').innerHTML = data.tagline;
                    document.getElementById('dom-barcode-text').textContent = data.employee_id;
                    
                    document.getElementById('dom-profile-img').src = data.profile_image;
                    document.getElementById('dom-qr-code').src = data.qr_code;
                    document.getElementById('dom-barcode').src = data.barcode;
                    
                    // Populate Contact Modal Variables
                    document.getElementById('dom-modal-name').textContent = data.name;
                    document.getElementById('dom-modal-email').textContent = data.email;
                    document.getElementById('dom-modal-phone').textContent = data.phone || "Not provided";
                    document.getElementById('dom-modal-address').textContent = data.address || "Not provided";

                    // FIX: Attach vCard generator to the Add to Contact button
                    const contactBtn = document.getElementById('dom-contact-btn');
                    contactBtn.href = "#"; // Remove any leftover mailto links
                    contactBtn.addEventListener('click', (e) => {
                        e.preventDefault(); // Stop page from jumping to top
                        generateAndDownloadVCard(data);
                    });

                    const linksContainer = document.getElementById('dom-social-links');
                    let linksHTML = '';
                    
                    data.social_links.forEach(link => {
                        if(link.platform === "Digital Card" || link.url === "card.html") {
                            linksHTML += `
                                <a href="javascript:void(0)" onclick="openVcardModal()" title="${link.platform}">
                                    <i class="${link.icon}" style="color: ${link.color};"></i>
                                </a>
                            `;
                        } else {
                            linksHTML += `
                                <a href="${link.url}" target="_blank" title="${link.platform}">
                                    <i class="${link.icon}" style="color: ${link.color};"></i>
                                </a>
                            `;
                        }
                    });
                    
                    linksContainer.innerHTML = linksHTML;
                })
                .catch(error => {
                    console.error("Error loading ID Card Data:", error);
                    document.getElementById('dom-name').textContent = "Error";
                });
        });

        // NEW: vCard Generator Function
        function generateAndDownloadVCard(data) {
            // Build the vCard string format
            let vcard = `BEGIN:VCARD\nVERSION:3.0\n`;
            vcard += `FN:${data.name || ""}\n`;
            if (data.company) vcard += `ORG:${data.company}\n`;
            if (data.designation) vcard += `TITLE:${data.designation}\n`;
            if (data.phone) vcard += `TEL;TYPE=WORK,VOICE:${data.phone}\n`;
            if (data.email) vcard += `EMAIL;TYPE=WORK,INTERNET:${data.email}\n`;
            if (data.address) vcard += `ADR;TYPE=WORK:;;${data.address};;;;\n`;
            vcard += `END:VCARD`;

            // Create a Blob containing the vCard data
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);

            // Create a temporary hidden link to trigger the download
            const newLink = document.createElement('a');
            newLink.download = `${(data.name || "Contact").replace(/\s+/g, '_')}.vcf`;
            newLink.href = url;
            newLink.style.display = 'none';
            document.body.appendChild(newLink);
            
            // Auto-click it, then clean up
            newLink.click();
            document.body.removeChild(newLink);
            URL.revokeObjectURL(url);
        }

        const themeBtn = document.getElementById('switch');
        const themeIcon = themeBtn.querySelector('i');
        
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            if (document.body.classList.contains('light-theme')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeBtn.style.color = '#fff';
                themeBtn.style.background = '#0f1015';
            } else {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeBtn.style.color = '#facc15';
                themeBtn.style.background = '#1c1d24';
            }
        });

        function openQRModal() { document.getElementById('qrModal').style.display = 'flex'; }
        function closeQRModal() { document.getElementById('qrModal').style.display = 'none'; }
        function openVcardModal() { document.getElementById('vcardModal').style.display = 'flex'; }
        function closeVcardModal() { document.getElementById('vcardModal').style.display = 'none'; }

        window.onclick = function(event) {
            let qrModal = document.getElementById('qrModal');
            let vcardModal = document.getElementById('vcardModal');
            if (event.target == qrModal) { qrModal.style.display = "none"; }
            if (event.target == vcardModal) { vcardModal.style.display = "none"; }
        }

        function shareCard() {
            if (navigator.share) {
                navigator.share({
                    title: 'My Digital Business Card',
                    text: 'Check out my professional profile!',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                alert("Sharing is not supported on this browser. Copy the URL from your address bar!");
            }
        }
        // NEW: Copy to Clipboard Function with Visual Feedback
        function copyDetail(elementId, clickedItem) {
            const textToCopy = document.getElementById(elementId).innerText;
            const labelElement = clickedItem.querySelector('small');
            
            // Prevent copying empty or loading states
            if (textToCopy && textToCopy !== "Loading..." && textToCopy !== "Not provided") {
                
                // Write to clipboard
                navigator.clipboard.writeText(textToCopy).then(() => {
                    
                    // Visual Feedback: Change label to "Copied!" and turn it green
                    const originalText = labelElement.innerText;
                    labelElement.innerText = "Copied!";
                    labelElement.style.color = "#4ade80"; // Bright green
                    
                    // Reset back to normal after 2 seconds
                    setTimeout(() => {
                        labelElement.innerText = originalText;
                        labelElement.style.color = ""; // Removes the inline green color
                    }, 2000);
                    
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                    alert("Failed to copy text. Your browser might not support this feature.");
                });
            }
        }
    </script>
</body>
</html>
